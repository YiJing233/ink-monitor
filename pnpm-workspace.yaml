# better-sqlite3 / esbuild / sharp all ship prebuilt binaries; the
# source rebuild needs Xcode CLT, which isn't always present.
# Skipping the rebuild step keeps `pnpm install` working everywhere.
allowBuilds:
  better-sqlite3: false
  esbuild: false
  sharp: false
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
