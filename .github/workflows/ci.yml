name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        # Invoke tsc directly via pnpm exec — skips any pnpm-managed
        # post-install rebuild that could be tripped by native modules.
        run: pnpm exec tsc --noEmit

      - name: Run vitest
        run: pnpm test

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output-node-${{ matrix.node }}
          path: |
            vitest-report.json
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'a'.repeat(64) }}
          NEXTAUTH_SECRET: test-secret-please-ignore
          ENABLE_DEV_LOGIN: 'true'
        run: pnpm build

  eink-smoke:
    name: E-ink display smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install + build
        env:
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'a'.repeat(64) }}
          NEXTAUTH_SECRET: test-secret-please-ignore
          ENABLE_DEV_LOGIN: 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Start server in background
        env:
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'a'.repeat(64) }}
          NEXTAUTH_SECRET: test-secret-please-ignore
          ENABLE_DEV_LOGIN: 'true'
        run: |
          nohup pnpm start > /tmp/server.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/display >/dev/null 2>&1; then
              echo "server up"
              break
            fi
            sleep 1
          done

      - name: Verify /display has e-ink hallmarks
        run: |
          set -euo pipefail
          html=$(curl -fsS http://localhost:3000/display)
          echo "$html" | grep -q 'http-equiv="refresh"' || { echo "missing meta refresh"; exit 1; }
          echo "$html" | grep -q 'class="eink"' || { echo "missing eink class"; exit 1; }
          echo "$html" | grep -q 'data-display-root' || { echo "missing data-display-root"; exit 1; }
          echo "/display passes e-ink smoke test"